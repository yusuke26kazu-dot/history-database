[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/api/data"
  to = "/.netlify/functions/data"
  status = 200

[[redirects]]
  from = "/api/files"
  to = "/.netlify/functions/files"
  status = 200

[[redirects]]
  from = "/api/files/*"
  to = "/.netlify/functions/files/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
